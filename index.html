<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UFont Converter</title>

<style>
/* -------------------------
   RESET + BASE
--------------------------*/
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg1: #0f172a;
  --bg2: #111827;
  --card: rgba(255,255,255,0.06);
  --card2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.12);
  --text: #e5e7eb;
  --muted: #9ca3af;

  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;

  --radius: 14px;
}

/* LIGHT MODE */
@media (prefers-color-scheme: light) {
  :root {
    --bg1: #f5f7fb;
    --bg2: #eef2ff;
    --card: rgba(255,255,255,0.7);
    --card2: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.08);
    --text: #111827;
    --muted: #6b7280;
  }
}

/* -------------------------
   BACKGROUND
--------------------------*/
body {
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
  color: var(--text);
  background: radial-gradient(circle at top, var(--bg2), var(--bg1));
}

/* -------------------------
   LAYOUT
--------------------------*/
.container {
  width: 100%;
  max-width: 620px;
}

/* HEADER */
header {
  margin-bottom: 24px;
  text-align: center;
}

header h1 {
  font-size: 22px;
  letter-spacing: 0.3px;
}

header p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}

/* -------------------------
   DROP ZONE
--------------------------*/
#drop-zone {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 34px 20px;
  text-align: center;
  backdrop-filter: blur(12px);
  transition: 0.2s ease;
  cursor: pointer;
}

#drop-zone:hover {
  transform: translateY(-2px);
  background: var(--card2);
}

#drop-zone.drag-over {
  border-color: var(--blue);
  transform: scale(1.01);
}

.drop-icon {
  font-size: 28px;
  margin-bottom: 12px;
  opacity: 0.8;
}

#drop-zone h2 {
  font-size: 16px;
  margin-bottom: 6px;
}

#drop-zone p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}

/* -------------------------
   BUTTONS
--------------------------*/
button {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  transition: 0.15s ease;
}

button:hover {
  background: rgba(255,255,255,0.08);
}

.btn-primary {
  background: var(--blue);
  border-color: transparent;
  color: white;
}

.btn-primary:hover {
  opacity: 0.9;
}

/* -------------------------
   RESULTS
--------------------------*/
#results {
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
}

/* ICON */
.card-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 11px;
  background: rgba(255,255,255,0.1);
}

/* INFO */
.card-info {
  flex: 1;
  min-width: 0;
}

.card-name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* BADGES */
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
}

/* BATCH BAR */
#batch-bar {
  display: none;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
}

/* LOADING */
.downloading {
  opacity: 0.5;
}
</style>
</head>

<body>
<div class="container">

  <header>
    <h1>UFont Converter</h1>
    <p>Fixes broken .ufont files and extracts real font formats</p>
  </header>

  <div id="drop-zone">
    <div class="drop-icon">⬇</div>
    <h2>Drop .ufont files here</h2>
    <p>TTF · OTF · WOFF · WOFF2 supported</p>
    <button onclick="fileInput.click()">Choose files</button>
    <input type="file" id="file-input" accept=".ufont" multiple hidden>
  </div>

  <div id="batch-bar">
    <span id="batch-label"></span>
    <button class="btn-primary" onclick="downloadAll()">Download all</button>
  </div>

  <div id="results"></div>
</div>

<script>
const SIGNATURES = [
  { magic:[0x00,0x01,0x00,0x00], ext:'ttf', label:'TrueType' },
  { magic:[0x4F,0x54,0x54,0x4F], ext:'otf', label:'OpenType' },
  { magic:[0x77,0x4F,0x46,0x46], ext:'woff', label:'WOFF' },
  { magic:[0x77,0x4F,0x46,0x32], ext:'woff2', label:'WOFF2' },
];

let success = [];

function detect(buf){
  const v = new Uint8Array(buf);
  for(const s of SIGNATURES){
    for(let i=0;i<64;i++){
      if(s.magic.every((b,idx)=>v[i+idx]===b)){
        return { ...s, offset:i };
      }
    }
  }
  return null;
}

async function process(file){
  const buf = await file.arrayBuffer();
  const d = detect(buf);

  if(!d){
    return { file, ok:false, reason:'No font signature found' };
  }

  const fixed = d.offset ? buf.slice(d.offset) : buf;
  const blob = new Blob([fixed], {type:'font/'+d.ext});

  return {
    ok:true,
    blob,
    name:file.name.replace(/\.ufont$/i,'')+'.'+d.ext,
    label:d.label,
    offset:d.offset
  };
}

function download(blob,name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=name;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadAll(){
  success.forEach(f=>download(f.blob,f.name));
}

function render(res){
  const card = document.createElement('div');
  card.className='card';

  const icon = document.createElement('div');
  icon.className='card-icon';

  const info = document.createElement('div');
  info.className='card-info';

  if(res.ok){
    icon.textContent = res.name.split('.').pop().toUpperCase();

    info.innerHTML = `
      <div class="card-name">${res.name}</div>
      <div class="card-meta">
        ${res.label}
        ${res.offset ? ` • fixed ${res.offset}px` : ' • clean'}
      </div>
    `;

    const btn = document.createElement('button');
    btn.className='btn-primary';
    btn.textContent='Download';
    btn.onclick=()=>download(res.blob,res.name);

    card.append(icon,info,btn);
    success.push(res);

    document.getElementById('batch-bar').style.display='flex';
    document.getElementById('batch-label').textContent =
      `${success.length} file(s) ready`;
  } else {
    icon.textContent='!';
    info.innerHTML=`
      <div class="card-name">${res.file.name}</div>
      <div class="card-meta">${res.reason}</div>
    `;
    card.append(icon,info);
  }

  return card;
}

async function handle(files){
  const results = document.getElementById('results');

  for(const f of files){
    const temp = document.createElement('div');
    temp.className='card';
    temp.innerHTML = `<div class="card-meta">Processing ${f.name}...</div>`;
    results.appendChild(temp);

    const res = await process(f);
    results.replaceChild(render(res), temp);
  }
}

const drop = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

drop.ondragover = e => { e.preventDefault(); drop.classList.add('drag-over'); };
drop.ondragleave = () => drop.classList.remove('drag-over');
drop.ondrop = e => {
  e.preventDefault();
  drop.classList.remove('drag-over');
  handle([...e.dataTransfer.files].filter(f=>f.name.endsWith('.ufont')));
};

fileInput.onchange = () => handle([...fileInput.files]);
</script>
</body>
</html>
